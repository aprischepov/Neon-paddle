name: iOS CI - Build and Upload to App Store Connect

on:
  push:
    branches: [ "release" ]
  workflow_dispatch: # Позволяет запускать workflow вручную из GitHub Actions UI

jobs:
  build-and-upload:
    runs-on: macos-latest
    
    env:
      BUNDLE_IDENTIFIER: ${{ secrets.BUNDLE_IDENTIFIER }}
      EXTENSION_BUNDLE_IDENTIFIER: ${{ secrets.EXTENSION_BUNDLE_IDENTIFIER }}

    steps:
    # Шаг 1: Клонируем репозиторий
    - name: Checkout code
      uses: actions/checkout@v4

    # Шаг 2: Устанавливаем Xcode version
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26.2' #Выставляем версию xcode

    # Шаг 3: Импортируем сертификат и профиль
    - name: Import Signing Assets
      uses: apple-actions/import-codesign-certs@v2
      with:
        p12-file-base64: ${{ secrets.APPSTORE_CONNECT_CERTIFICATE }}
        p12-password: ${{ secrets.APPSTORE_CONNECT_CERTIFICATE_PASSWORD }}
        p12-import-location: "file"
        create-keychain: true
        keychain-password: "temp_password"

    - name: Install Provisioning Profile
      run: |
        echo "${{ secrets.APPSTORE_CONNECT_PROVISIONING_PROFILE }}" | base64 --decode > profile.mobileprovision
        if [ ! -f profile.mobileprovision ]; then
          echo "❌ Error: Failed to decode provisioning profile"
          exit 1
        fi
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
        UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i profile.mobileprovision)")
        if [ -z "$UUID" ]; then
          echo "❌ Error: Failed to extract UUID from provisioning profile"
          exit 1
        fi
        cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
        echo "✅ Installed provisioning profile with UUID: $UUID"

    # Профиль для Notification Service Extension (отдельный App ID / bundle id)
    - name: Install Extension Provisioning Profile
      run: |
        EXT_B64="${{ secrets.APPSTORE_CONNECT_EXTENSION_PROVISIONING_PROFILE }}"
        if [ -z "$EXT_B64" ]; then
          echo "❌ Error: Add repository secret APPSTORE_CONNECT_EXTENSION_PROVISIONING_PROFILE."
          echo "   In Apple Developer: Profiles → Distribution for the extension target (GlowBounceNotificationService),"
          echo "   base64-encode the .mobileprovision file and paste into the secret."
          exit 1
        fi
        echo "$EXT_B64" | base64 --decode > profile_extension.mobileprovision
        if [ ! -s profile_extension.mobileprovision ]; then
          echo "❌ Error: Failed to decode extension provisioning profile"
          exit 1
        fi
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
        UUID_EXT=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i profile_extension.mobileprovision)")
        if [ -z "$UUID_EXT" ]; then
          echo "❌ Error: Failed to extract UUID from extension provisioning profile"
          exit 1
        fi
        cp profile_extension.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID_EXT.mobileprovision
        echo "✅ Installed extension provisioning profile with UUID: $UUID_EXT"
    
    # Шаг 4: Устанавливаем сертификат Push Notifications (опционально)
    - name: Install Push Notification Certificate
      env:
        PUSH_CERT_BASE64: ${{ secrets.PUSH_NOTIFICATION_CERTIFICATE }}
        PUSH_CERT_PASSWORD: ${{ secrets.PUSH_NOTIFICATION_CERTIFICATE_PASSWORD }}
      run: |
        if [ -z "$PUSH_CERT_BASE64" ] || [ "$PUSH_CERT_BASE64" = "" ]; then
          echo "⚠️ Push Notification certificate not provided in secrets, skipping..."
          exit 0
        fi
        
        echo "=== Installing Push Notification Certificate ==="
        
        # Декодируем base64 в файл
        echo "$PUSH_CERT_BASE64" | base64 --decode > push_cert.p12
        
        if [ ! -f push_cert.p12 ] || [ ! -s push_cert.p12 ]; then
          echo "❌ Error: Failed to decode push notification certificate"
          exit 1
        fi
        
        echo "✅ Certificate file decoded successfully ($(wc -c < push_cert.p12) bytes)"
        
        # Определяем keychain (используем тот же, что создан для signing)
        # apple-actions/import-codesign-certs создает keychain, находим его
        KEYCHAIN_PATH=$(security list-keychains | grep -i "keychain" | head -1 | tr -d ' ' | tr -d '"')
        if [ -z "$KEYCHAIN_PATH" ]; then
          KEYCHAIN_PATH="$HOME/Library/Keychains/login.keychain-db"
        fi
        
        echo "✅ Using keychain: $KEYCHAIN_PATH"
        
        # Разблокируем keychain
        security unlock-keychain -p "temp_password" "$KEYCHAIN_PATH" 2>/dev/null || true
        
        # Импортируем сертификат в keychain
        echo "=== Importing certificate to keychain ==="
        if [ -n "$PUSH_CERT_PASSWORD" ] && [ "$PUSH_CERT_PASSWORD" != "" ]; then
          security import push_cert.p12 -k "$KEYCHAIN_PATH" -P "$PUSH_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security 2>&1
          IMPORT_RESULT=$?
        else
          security import push_cert.p12 -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security 2>&1
          IMPORT_RESULT=$?
        fi
        
        if [ $IMPORT_RESULT -eq 0 ]; then
          echo "✅ Certificate imported successfully"
        else
          echo "⚠️ Warning: Certificate import returned code $IMPORT_RESULT (may already exist)"
        fi
        
        # Проверяем, что сертификат установлен
        CERT_INFO=$(security find-certificate -a -c "Apple Push Notification" "$KEYCHAIN_PATH" 2>/dev/null | grep -i "labl" | head -1 || echo "")
        
        if [ -n "$CERT_INFO" ]; then
          echo "✅ Push Notification certificate verified in keychain"
          echo "   $CERT_INFO"
        else
          echo "⚠️ Warning: Could not verify certificate installation (it may be installed with different name)"
        fi
        
        # Очищаем временный файл
        rm -f push_cert.p12
        echo "✅ Push Notification certificate setup completed"
    
    # Шаг 5: Разрешаем Swift Package Manager зависимости
    - name: Resolve Swift Package Dependencies
      run: |
        echo "=== Resolving Swift Package Manager dependencies ==="
        xcodebuild -resolvePackageDependencies \
          -project ${{ secrets.TARGET_PROJECT }}.xcodeproj \
          -scheme "${{ secrets.TARGET_PROJECT }}"
        
        if [ $? -eq 0 ]; then
          echo "✅ Swift Package dependencies resolved successfully"
        else
          echo "❌ Error: Failed to resolve Swift Package dependencies"
          exit 1
        fi
    
    # Шаг 6: Собираем архив
    - name: Build and Archive iOS App
      run: |
        mkdir -p ./output
        # Извлекаем имя профиля
        if [ ! -f "profile.mobileprovision" ]; then
          echo "❌ Error: profile.mobileprovision not found"
          exit 1
        fi
        
        PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' /dev/stdin <<< "$(security cms -D -i profile.mobileprovision)")
        if [ -z "$PROFILE_NAME" ]; then
          echo "❌ Error: Failed to extract profile name"
          exit 1
        fi
        PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i profile.mobileprovision)")
        if [ -z "$PROFILE_UUID" ]; then
          echo "❌ Error: Failed to extract UUID from provisioning profile"
          exit 1
        fi
        echo "✅ Using profile: $PROFILE_NAME (UUID: $PROFILE_UUID)"
        
        # Получаем релизный bundle identifier из GitHub Actions секретов
        echo "=== Using release bundle identifier from GitHub Actions ==="
        BUNDLE_ID="$BUNDLE_IDENTIFIER"
        if [ -z "$BUNDLE_ID" ]; then
          echo "❌ Error: BUNDLE_IDENTIFIER secret is not set in GitHub Actions"
          exit 1
        fi
        echo "✅ Using release bundle identifier: $BUNDLE_ID"
        
        if [ -z "$EXTENSION_BUNDLE_IDENTIFIER" ]; then
          echo "❌ Error: EXTENSION_BUNDLE_IDENTIFIER secret is not set (bundle id таргета GlowBounceNotificationService, как в Apple Developer)"
          exit 1
        fi
        echo "✅ Extension bundle identifier from secrets: $EXTENSION_BUNDLE_IDENTIFIER"
        
        # Настраиваем keychain для использования сертификата
        # apple-actions/import-codesign-certs создает keychain с именем по умолчанию
        KEYCHAIN_PATH=$(security list-keychains | grep -i "keychain" | head -1 | tr -d ' ' | tr -d '"')
        if [ -z "$KEYCHAIN_PATH" ]; then
          KEYCHAIN_PATH="$HOME/Library/Keychains/login.keychain-db"
        fi
        echo "✅ Using keychain: $KEYCHAIN_PATH"
        
        # Разблокируем keychain
        security unlock-keychain -p "temp_password" "$KEYCHAIN_PATH" 2>/dev/null || true
        
        # Получаем имя сертификата для подписи (ищем Apple Distribution или iPhone Distribution)
        CODE_SIGN_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" 2>/dev/null | grep -E "(Apple Distribution|iPhone Distribution)" | head -1 | sed -E 's/.*"([^"]+)".*/\1/' || echo "Apple Distribution")
        if [ -z "$CODE_SIGN_IDENTITY" ] || [ "$CODE_SIGN_IDENTITY" = "Apple Distribution" ]; then
          # Пробуем найти любой сертификат для подписи
          CODE_SIGN_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" 2>/dev/null | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
        fi
        echo "✅ Using code sign identity: $CODE_SIGN_IDENTITY"
        
        # Проверяем, поддерживает ли provisioning profile Push Notifications
        # Если нет - временно отключаем entitlement для сборки
        PROFILE_CONTENT=$(security cms -D -i profile.mobileprovision 2>/dev/null)
        HAS_PUSH=$(echo "$PROFILE_CONTENT" | grep -i "aps-environment" || echo "")
        
        if [ -z "$HAS_PUSH" ]; then
          echo "⚠️ Warning: Provisioning profile doesn't support Push Notifications, disabling aps-environment entitlement"
          # Создаем временный entitlements файл без aps-environment
          echo '<?xml version="1.0" encoding="UTF-8"?>' > ${{ secrets.TARGET_PROJECT }}/${{ secrets.TARGET_PROJECT }}.entitlements.tmp
          echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' >> ${{ secrets.TARGET_PROJECT }}/${{ secrets.TARGET_PROJECT }}.entitlements.tmp
          echo '<plist version="1.0">' >> ${{ secrets.TARGET_PROJECT }}/${{ secrets.TARGET_PROJECT }}.entitlements.tmp
          echo '<dict>' >> ${{ secrets.TARGET_PROJECT }}/${{ secrets.TARGET_PROJECT }}.entitlements.tmp
          echo '</dict>' >> ${{ secrets.TARGET_PROJECT }}/${{ secrets.TARGET_PROJECT }}.entitlements.tmp
          echo '</plist>' >> ${{ secrets.TARGET_PROJECT }}/${{ secrets.TARGET_PROJECT }}.entitlements.tmp
          CODE_SIGN_ENTITLEMENTS="${{ secrets.TARGET_PROJECT }}/${{ secrets.TARGET_PROJECT }}.entitlements.tmp"
        else
          CODE_SIGN_ENTITLEMENTS="${{ secrets.TARGET_PROJECT }}/${{ secrets.TARGET_PROJECT }}.entitlements"
        fi
        echo "✅ Using entitlements: $CODE_SIGN_ENTITLEMENTS"
        
        # Если нужно использовать временный entitlements файл (без push notifications),
        # заменяем оригинальный файл
        if [ "$CODE_SIGN_ENTITLEMENTS" != "${{ secrets.TARGET_PROJECT }}/${{ secrets.TARGET_PROJECT }}.entitlements" ]; then
          echo "⚠️ Replacing entitlements file with temporary version"
          cp "$CODE_SIGN_ENTITLEMENTS" ${{ secrets.TARGET_PROJECT }}/${{ secrets.TARGET_PROJECT }}.entitlements
        fi
        
        # Исключаем SPM от лишней подписи; основное приложение + GlowBounceNotificationService — manual + UUID профилей
        if [ ! -f "profile_extension.mobileprovision" ]; then
          echo "❌ Error: profile_extension.mobileprovision not found (Install Extension Provisioning Profile step)"
          exit 1
        fi
        EXTENSION_PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i profile_extension.mobileprovision)")
        if [ -z "$EXTENSION_PROFILE_UUID" ]; then
          echo "❌ Error: Failed to read UUID from extension provisioning profile"
          exit 1
        fi
        echo "✅ Extension provisioning profile UUID: $EXTENSION_PROFILE_UUID"
        
        echo "🔧 Configuring signing: main app + notification extension; SPM cleaned"
        
        SPM_SCRIPT=".github/scripts/exclude_spm_from_signing.py"
        if [ ! -f "$SPM_SCRIPT" ]; then
          echo "❌ Error: Script not found at $SPM_SCRIPT"
          exit 1
        fi
        
        export CI_PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID"
        export CI_CODE_SIGN_IDENTITY="$CODE_SIGN_IDENTITY"
        export CI_DEVELOPMENT_TEAM="${{ secrets.TEAM_ID }}"
        python3 "$SPM_SCRIPT" "${{ secrets.TARGET_PROJECT }}.xcodeproj/project.pbxproj" "$PROFILE_UUID" "${{ secrets.TARGET_PROJECT }}" "$EXTENSION_PROFILE_UUID"
        
        if [ $? -ne 0 ]; then
          echo "❌ Error: Failed to configure signing settings"
          exit 1
        fi
        
        # НЕ передаем PROVISIONING_PROFILE_SPECIFIER и CODE_SIGN_ENTITLEMENTS через командную строку,
        # чтобы не применять их к SPM зависимостям
        # Используем настройки проекта, где они настроены только для основного таргета
        XCODEBUILD_PARAMS=(
          -project ${{ secrets.TARGET_PROJECT }}.xcodeproj
          -scheme "${{ secrets.TARGET_PROJECT }}"
          -configuration Release
          -destination 'generic/platform=iOS'
          -archivePath ./output/${{ secrets.TARGET_PROJECT }}.xcarchive
          -skipPackageUpdates
          DEVELOPMENT_TEAM=${{ secrets.TEAM_ID }}
          COMPILER_INDEX_STORE_ENABLE=NO
          SWIFT_COMPILATION_MODE=wholemodule
          ONLY_ACTIVE_ARCH=NO
        )
        
        xcodebuild "${XCODEBUILD_PARAMS[@]}" archive 2>&1 | tee xcodebuild.log
        
        BUILD_EXIT_CODE=${PIPESTATUS[0]}
        if [ "$BUILD_EXIT_CODE" -ne 0 ]; then
          echo "❌ Error: xcodebuild archive failed (exit $BUILD_EXIT_CODE)"
          exit 1
        fi
        if [ ! -d "./output/${{ secrets.TARGET_PROJECT }}.xcarchive" ]; then
          echo "❌ Error: Archive was not created"
          exit 1
        fi
        
        echo "✅ Build finished at $(date) ==="
    
    # Шаг 7: Загружаем логи сборки
    - name: Upload Build Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: xcodebuild-logs
        path: |
          xcodebuild.log
    
    # Шаг 8: Получаем имя профиля и создаем ExportOptions.plist
    - name: Create Export Options
      run: |
        # Извлекаем имя профиля из установленного файла
        if [ ! -f "profile.mobileprovision" ]; then
          echo "❌ Error: profile.mobileprovision not found"
          exit 1
        fi
        
        # Получаем имя профиля и релизный bundle identifier для ExportOptions.plist
        PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' /dev/stdin <<< "$(security cms -D -i profile.mobileprovision)")
        if [ -z "$PROFILE_NAME" ]; then
          echo "❌ Error: Failed to extract profile name"
          exit 1
        fi
        
        # Используем релизный bundle identifier из GitHub Actions секретов
        BUNDLE_ID="$BUNDLE_IDENTIFIER"
        if [ -z "$BUNDLE_ID" ]; then
          echo "❌ Error: BUNDLE_IDENTIFIER secret is not set in GitHub Actions"
          exit 1
        fi
        
        echo "✅ Using profile: $PROFILE_NAME for release bundle ID: $BUNDLE_ID"
        
        if [ ! -f "profile_extension.mobileprovision" ]; then
          echo "❌ Error: profile_extension.mobileprovision not found"
          exit 1
        fi
        EXTENSION_PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' /dev/stdin <<< "$(security cms -D -i profile_extension.mobileprovision)")
        EXTENSION_BUNDLE_ID="$EXTENSION_BUNDLE_IDENTIFIER"
        if [ -z "$EXTENSION_BUNDLE_ID" ] || [ -z "$EXTENSION_PROFILE_NAME" ]; then
          echo "❌ Error: EXTENSION_BUNDLE_IDENTIFIER secret or extension profile name is missing"
          exit 1
        fi
        echo "✅ Extension export mapping (bundle id из секрета): $EXTENSION_BUNDLE_ID -> $EXTENSION_PROFILE_NAME"
        
        # Без «голого» <?xml у колонки 0 — иначе YAML workflow считает это началом нового документа.
        {
          echo '<?xml version="1.0" encoding="UTF-8"?>'
          echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'
          echo '<plist version="1.0">'
          echo '<dict>'
          echo '    <key>method</key>'
          echo '    <string>app-store-connect</string>'
          echo '    <key>teamID</key>'
          echo "    <string>${{ secrets.TEAM_ID }}</string>"
          echo '    <key>signingStyle</key>'
          echo '    <string>manual</string>'
          echo '    <key>provisioningProfiles</key>'
          echo '    <dict>'
          echo "        <key>${BUNDLE_ID}</key>"
          echo "        <string>${PROFILE_NAME}</string>"
          echo "        <key>${EXTENSION_BUNDLE_ID}</key>"
          echo "        <string>${EXTENSION_PROFILE_NAME}</string>"
          echo '    </dict>'
          echo '    <key>uploadBitcode</key>'
          echo '    <false/>'
          echo '    <key>uploadSymbols</key>'
          echo '    <false/>'
          echo '</dict>'
          echo '</plist>'
        } > ExportOptions.plist
        
        echo "✅ Created ExportOptions.plist"
        plutil -lint ExportOptions.plist
        cat ExportOptions.plist
    
    # Шаг 9: Экспортируем .ipa файл
    - name: Export IPA
      run: |
        if [ ! -d "./output/${{ secrets.TARGET_PROJECT }}.xcarchive" ]; then
          echo "❌ Error: Archive not found"
          exit 1
        fi
        
        if [ ! -f "./ExportOptions.plist" ]; then
          echo "❌ Error: ExportOptions.plist not found"
          exit 1
        fi
        
        xcodebuild -exportArchive \
                   -archivePath ./output/${{ secrets.TARGET_PROJECT }}.xcarchive \
                   -exportOptionsPlist ./ExportOptions.plist \
                   -exportPath ./output
        
        # Проверяем успешность экспорта — ищем любой IPA, имя может отличаться от ${{ secrets.TARGET_PROJECT }}
        echo "=== Checking exported files in ./output ==="
        ls -lah ./output/

        IPA_FILE=$(find ./output -maxdepth 1 -name "*.ipa" -type f | head -1)

        if [ -z "$IPA_FILE" ]; then
          echo "❌ Error: IPA file was not created"
          echo "Files in output directory:"
          ls -lah ./output/
          exit 1
        fi

        # Переименовываем в стандартное имя для следующих шагов
        mv "$IPA_FILE" ./output/${{ secrets.TARGET_PROJECT }}.ipa

        echo "✅ IPA exported successfully: ./output/${{ secrets.TARGET_PROJECT }}.ipa"
    
    # Шаг 10: Проверяем созданный IPA
    - name: Check IPA File
      run: |
        if [ ! -f "./output/${{ secrets.TARGET_PROJECT }}.ipa" ]; then
          echo "❌ Error: IPA file not found"
          exit 1
        fi
        
        echo "=== Created files ==="
        ls -lah ./output/
        echo ""
        echo "=== IPA file size ==="
        du -h ./output/${{ secrets.TARGET_PROJECT }}.ipa
        echo ""
        echo "=== IPA file info ==="
        file ./output/${{ secrets.TARGET_PROJECT }}.ipa
    
    # Шаг 11: Загружаем билд в App Store Connect
    - name: Upload to App Store Connect
      env:
        API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
        API_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_API_ISSUER_ID }}
        API_PRIVATE_KEY: ${{ secrets.APPSTORE_CONNECT_API_PRIVATE_KEY }}
      run: |
        # Проверяем наличие IPA файла
        if [ ! -f "./output/${{ secrets.TARGET_PROJECT }}.ipa" ]; then
          echo "❌ Error: IPA file not found"
          exit 1
        fi
        
        # Проверяем наличие необходимых секретов
        if [ -z "$API_KEY_ID" ] || [ -z "$API_ISSUER_ID" ] || [ -z "$API_PRIVATE_KEY" ]; then
          echo "❌ Error: Missing required API credentials"
          exit 1
        fi
        
        # Создаем папку для приватных ключей (стандартное место для xcrun altool)
        mkdir -p ~/.appstoreconnect/private_keys
        
        # Создаем файл API ключа в правильной локации для xcrun altool
        echo "$API_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8
        chmod 600 ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8
        
        # Проверяем что файл создан
        if [ ! -f ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8 ]; then
          echo "❌ Error: Failed to create API key file"
          exit 1
        fi
        
        echo "✅ API key file created"
        echo "=== API Key file info ==="
        ls -lah ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8
        
        # Используем xcrun altool для загрузки (встроенный в Xcode, не требует Python)
        echo "=== Uploading to App Store Connect ==="
        xcrun altool --upload-app \
          --type ios \
          --file "./output/${{ secrets.TARGET_PROJECT }}.ipa" \
          --apiKey "$API_KEY_ID" \
          --apiIssuer "$API_ISSUER_ID" \
          --verbose
        
        if [ $? -ne 0 ]; then
          echo "❌ Error: Failed to upload to App Store Connect"
          exit 1
        fi
        
        echo "✅ Successfully uploaded to App Store Connect"
